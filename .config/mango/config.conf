# Autostart

exec=~/.local/bin/wlsunset
exec=~/.local/bin/battery-check
exec=awww-daemon
exec-once=quickshell -p ~/.config/quickshell >/dev/null 2>&1 &
exec-once=waybar
exec-once=sh ~/.local/bin/setbg

# Input

repeat_rate=90
repeat_delay=180
numlockon=1
xkb_rules_layout=gb

# Trackpad

disable_trackpad=0
trackpad_natural_scrolling=0
mouse_natural_scrolling=0
trackpad_accel_speed=0.2
mouse_accel_speed=0.2


# Appearance

source=~/.config/mango/colors.conf

blur=1
blur_optimized=1
blur_params_radius=4

animations=1
layer_animations=1

animation_type_open=slide
animation_type_close=slide
layer_animation_type_open=slide
layer_animation_type_close=slide

animation_fade_in=0
animation_fade_out=0

animation_duration_move=400
animation_duration_open=300
animation_duration_tag=300
animation_duration_close=200
animation_duration_focus=0

bind=SUPER,a,togglegaps
gappiv=1
gappih=2
gappov=2
gappoh=1
borderpx=3
border_radius=2
no_border_when_single=0


# Behaviour

new_is_master=1
default_mfact=0.58
center_master_overspread=0
enable_hotarea=0
cursor_hide_timeout=1
warpcursor=1
sloppyfocus=1
axis_bind_apply_timeout=30
drag_tile_to_tile=1
enable_floating_snap=0
snap_distance=30
bind=SUPER,x,incgaps, -3
bind=SUPER,z,incgaps, +3


# Scroller

scroller_structs=4
scroller_default_proportion=1
scroller_focus_center=0
scroller_ignore_proportion_single=0
scroller_default_proportion_single=1.0
scroller_prefer_center=1
scroller_prefer_overspread=0
edge_scroller_pointer_focus=0


# Tag Rules

tagrule=id:1,layout_name:tile
tagrule=id:2,layout_name:tile
tagrule=id:3,layout_name:tile
tagrule=id:4,layout_name:tile
tagrule=id:5,layout_name:tile
tagrule=id:6,layout_name:tile
tagrule=id:7,layout_name:tile
tagrule=id:8,layout_name:tile
tagrule=id:9,layout_name:tile


# Key Bindings

# --- System ---
bind=SUPER,BackSpace,spawn, qs ipc call powermenu toggle
bind=SUPER,grave,spawn,qs ipc call emojipicker toggle
bind=SUPER+SHIFT,p,spawn,qs ipc call screenshotter toggle
bind=SUPER,apostrophe,spawn,qs ipc call calc toggle
bind=Alt,r,reload_config
bind=SUPER,q,killclient,
bind=SUPER+SHIFT,s,spawn,qs ipc call wallpaperSelector toggle
bind=SUPER,b,spawn,~/.local/bin/setbg
bind=SUPER,F1,spawn,~/.local/bin/record-screen
bind=SUPER,F2,spawn,~/.local/bin/end-recording
bind=SUPER,F3,spawn,qs ipc call timezone toggle
bind=SUPER,F4,spawn,qs ipc call network toggle
bind=SUPER,F5,spawn,qs ipc call drives toggle
bind=SUPER+SHIFT,n,spawn, qs ipc call notifications toggle
bind=SUPER+SHIFT,o,spawn,flatpak run com.obsproject.Studio
bind=CTRL+ALT,l,spawn,qs ipc call lockscreen lock

# --- Terminal & Launcher ---
bind=SUPER,Return,spawn,foot
bind=SUPER,d,spawn, qs ipc call applauncher toggle

# --- Applications ---
bind=SUPER,w,spawn,brave
bind=SUPER+SHIFT,w,spawn,brave
bind=SUPER,r,spawn,foot -e yazi
bind=SUPER,s,spawn,sioyek
bind=SUPER+SHIFT,d,spawn,keepassxc
bind=SUPER+SHIFT,f,spawn,flatpak run io.freetubeapp.FreeTube
bind=SUPER,e,spawn,thunderbird
bind=SUPER,c,spawn,vesktop
bind=SUPER+SHIFT,b,spawn,blender
bind=SUPER,n,spawn,foot -e nvim -c VimwikiIndex
bind=SUPER,v,spawn,tradingview

# --- Focus ---
bind=SUPER,j,focusstack,next
bind=SUPER,k,focusstack,prev

# --- Swap Windows ---
bind=SUPER+SHIFT,h,exchange_client,left
bind=SUPER+SHIFT,j,exchange_client,down
bind=SUPER+SHIFT,k,exchange_client,up
bind=SUPER+SHIFT,l,exchange_client,right

# --- Resize Windows ---
bind=SUPER,l,resizewin,50,0
bind=SUPER,h,resizewin,-50,0

# --- Layouts ---
bind=SUPER,t,setlayout,tile
bind=SUPER+SHIFT,t,setlayout,vertical_tile
bind=SUPER+SHIFT,c,setlayout,tgmix
bind=SUPER+SHIFT,v,setlayout,vertical_scroller



# --- Master/Stack ---
bind=SUPER,i,incnmaster,+1
bind=SUPER,o,incnmaster,-1

# --- Window State ---
bind=SUPER,f,togglemaximizescreen
bind=SUPER,space,zoom

# --- Tags: View ---
bind=SUPER,1,view,1
bind=SUPER,2,view,2
bind=SUPER,3,view,3
bind=SUPER,4,view,4
bind=SUPER,5,view,5
bind=SUPER,6,view,6
bind=SUPER,7,view,7
bind=SUPER,8,view,8
bind=SUPER,9,view,9

# --- Tags: Move Window ---
bind=SUPER+SHIFT,1,tagsilent,1
bind=SUPER+SHIFT,2,tagsilent,2
bind=SUPER+SHIFT,3,tagsilent,3
bind=SUPER+SHIFT,4,tagsilent,4
bind=SUPER+SHIFT,5,tagsilent,5
bind=SUPER+SHIFT,6,tagsilent,6
bind=SUPER+SHIFT,7,tagsilent,7
bind=SUPER+SHIFT,8,tagsilent,8
bind=SUPER+SHIFT,9,tagsilent,9
bind=SUPER,0,toggleoverview
bind=SUPER+SHIFT,g,tagtoleft
bind=SUPER+SHIFT,semicolon,tagtoright

# --- Tag Navigation ---
bind=SUPER,g,viewtoleft
bind=SUPER,semicolon,viewtoright
axisbind=SUPER,UP,viewtoleft_have_client
axisbind=SUPER,DOWN,viewtoright_have_client

# --- Brightness (media keys) ---
bind=NONE,XF86MonBrightnessUp,spawn,brightnessctl s +10%+
bind=NONE,XF86MonBrightnessDown,spawn,brightnessctl s 10%-

# --- Brightness (keyboard) ---
bind=SUPER,Up,spawn,brightnessctl s +10%+
bind=SUPER,Down,spawn,brightnessctl s 10%-

# --- Sound (media keys) ---
bind=NONE,XF86AudioRaiseVolume,spawn,wpctl set-volume @DEFAULT_SINK@ 5%+
bind=NONE,XF86AudioLowerVolume,spawn,wpctl set-volume @DEFAULT_SINK@ 5%-
bind=NONE,XF86AudioMute,spawn,wpctl set-mute @DEFAULT_SINK@ toggle

# --- Sound (keyboard) ---
bind=SUPER,period,spawn,wpctl set-volume @DEFAULT_SINK@ 5%+
bind=SUPER,comma,spawn,wpctl set-volume @DEFAULT_SINK@ 5%-
bind=SUPER,m,spawn,wpctl set-mute @DEFAULT_SINK@ toggle

# --- Overview ---
enable_hotarea=0


# --- Rules and Extras ---
syncobj_enable=1
allow_tearing=1

# Layer Rules
layerrule=noanim:1,layer_name:quickshell
